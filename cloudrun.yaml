apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: seo-backlink-trello
  # Replace with your GCP project ID and region if deploying from CI/CD
  # annotations:
  #   run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Prevent cold starts if desired (costs a bit more)
        # autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
        - image: DOCKER_IMAGE_URL_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            # The frontend/Vite expects this structure when served from Go
            - name: PORT
              value: "8080"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  # This assumes you created a secret named 'gemini-api-key' in Google Secret Manager
                  key: latest
                  name: gemini-api-key
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
