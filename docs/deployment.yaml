# Google Cloud Run Deployment Guide

This project is built to be deployed seamlessly to Google Cloud Run as a single container serving both the React frontend and Go backend API.

## Prerequisites

1.  [Google Cloud CLI (`gcloud`)](https://cloud.google.com/sdk/docs/install) installed and authenticated.
2.  A Google Cloud Project with Billing configured.
3.  The Cloud Run, Cloud Build, and Secret Manager APIs enabled in your GCP project.

## Step 1: Set up Secret Manager for the Gemini API Key

We use Google Secret Manager to securely pass the Gemini API key to the application without hardcoding it in the image or exposing it in plaintext environment variables.

```bash
# Set your active project
gcloud config set project YOUR_PROJECT_ID

# Create the secret (named 'gemini-api-key' as expected by cloudrun.yaml)
gcloud secrets create gemini-api-key --replication-policy="automatic"

# Add your Gemini API key value to the secret
echo -n "YOUR_AKTUAL_GEMINI_API_KEY" | gcloud secrets versions add gemini-api-key --data-file=-
```

## Step 2: Build the Combined Container Image

The `Dockerfile` employs a multi-stage build. It first builds the React UI (Vite) and the Go backend simultaneously, then copies the compiled binaries and static files into a single lightweight final layer.

Submit the build to Google Cloud Build (or build locally and push to Artifact Registry):

```bash
gcloud builds submit --tag gcr.io/YOUR_PROJECT_ID/seo-backlink-trello
```

## Step 3: Configure and Deploy

The `cloudrun.yaml` file defines the declarative configuration for the service.

1.  Open `cloudrun.yaml`.
2.  Find the line `image: DOCKER_IMAGE_URL_PLACEHOLDER`.
3.  Replace `DOCKER_IMAGE_URL_PLACEHOLDER` with the image tag you just built (e.g., `gcr.io/YOUR_PROJECT_ID/seo-backlink-trello`).

Deploy the service replacing the configuration from the file:

```bash
gcloud run services replace cloudrun.yaml \
    --region us-central1
```

*(You can replace `us-central1` with your preferred region).*

## Step 4: Grant Secret Access

The Cloud Run default service account needs permission to read the secret you created in Step 1.

```bash
# Get the default compute service account for your project
PROJECT_NUM=$(gcloud projects describe YOUR_PROJECT_ID --format="value(projectNumber)")
SVC_ACCOUNT="${PROJECT_NUM}-compute@developer.gserviceaccount.com"

# Grant the permission
gcloud secrets add-iam-policy-binding gemini-api-key \
    --member="serviceAccount:${SVC_ACCOUNT}" \
    --role="roles/secretmanager.secretAccessor"
```

## Future Updates

When making changes, simply repeat Step 2 and Step 3. Since `cloudrun.yaml` is declarative, your configuration limits and environment variable mappings (like Secret Manager bindings) will persist securely upon new image rollouts.
